<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SDX Hero</title>
  <desc id="desc">AI-inspired system design banner with a wrapped ribbon motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061023"/>
      <stop offset="0.5" stop-color="#0E1B34"/>
      <stop offset="1" stop-color="#112B38"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="318" y1="130" x2="1278" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BE4C8"/>
      <stop offset="0.45" stop-color="#53B8FF"/>
      <stop offset="1" stop-color="#7DFB8D"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="294" y1="519" x2="1299" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C66A"/>
      <stop offset="0.5" stop-color="#F18E8E"/>
      <stop offset="1" stop-color="#A3F0FF"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 320) rotate(90) scale(190)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#7BE8FF" stop-opacity="0.16"/>
    </radialGradient>
    <filter id="glow" x="0" y="0" width="1600" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>

