    <text x="172" y="256" font-size="20" font-weight="500" fill="#9DD8E8">System Design Intelligence CLI</text>
    <text x="172" y="305" font-size="17" fill="#C8EDF6">Cross-repo architecture maps, contracts, planning reviews, and codex context packs.</text>
