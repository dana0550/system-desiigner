name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Version packages from changesets
        id: version
        run: |
          npm run version-packages
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No unreleased changesets found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit release version changes
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main
      - name: Publish npm package
        if: steps.version.outputs.changed == 'true'
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${RELEASE_VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
            exit 0
          fi
          gh release create "${TAG}" --target main --title "sdx-cli ${TAG}" --generate-notes
      - name: Release summary
        run: |
          if [ "${{ steps.version.outputs.changed }}" = "true" ]; then
            echo "Released sdx-cli@${{ steps.version.outputs.version }}"
          else
            echo "No release changeset found on this merge."
          fi
